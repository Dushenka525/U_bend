data:
  raw_data_path: data/raw/ubend3888.csv
  params_ranges:
    B4TOD4:
    - 0.01
    - 0.08
    B5TOB4:
    - 1.0
    - 1.5
    R45TOB4:
    - 0.9
    - 5.0
    OMEGA5:
    - -5.0
    - 5.0
    GAMMAU:
    - -0.5
    - 0.5
    ALPHA4:
    - 10.0
    - 60.0
    RE:
    - 100000
    - 500000
  normalized_data_path: data/processed/norm_ubend3888.csv
  train_data_path: data/processed/train_ubend3888.csv
  val_data_path: data/processed/val_ubend3888.csv
  val_size: 0.3
model:
  register_model_name: GPr_random
  model_info_dir: models
  query_strategy_type: random
  model_type: gpr
  model_params:
    regressors_params:
    - input_dim: 7
      kernel_type: RBF
      optimizer: Adam
      lr: 0.05
    - input_dim: 7
      kernel_type: Matern
      nu: 1.5
      optimizer: Adam
      lr: 0.05
    - input_dim: 7
      kernel_type: Matern
      nu: 2.5
      optimizer: Adam
      lr: 0.05
  n_start_points: 11
  estimation_step: 50
  experiment_name: gpr_random1
train:
  train_data_path: data/processed/train_ubend3888.csv
  val_data_path: data/processed/val_ubend3888.csv
  normalized_data_path: data/processed/norm_ubend3888.csv
  experiment_name: train_baselines
  model_info_dir: models/baseline
